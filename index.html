<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>灰烬之魔女 · 伊蕾娜</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Cinzel:wght@400;600&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ash: #c8bfb8;
      --lavender: #b8a9c9;
      --deep: #1a1520;
      --card: #221e2a;
      --border: rgba(200, 185, 200, 0.18);
      --glow: rgba(184, 169, 201, 0.3);
      --text: #e8e0f0;
      --muted: #9b8fa8;
      --user-bg: rgba(184, 169, 201, 0.12);
      --ai-bg: rgba(50, 42, 62, 0.7);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background-color: var(--deep);
      color: var(--text);
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      position: relative;
    }

    /* ── 星空背景 ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(100, 70, 130, 0.18) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(60, 40, 90, 0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 0%, rgba(150, 120, 180, 0.1) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    /* 浮动的粒子 */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: var(--lavender);
      opacity: 0;
      animation: float-particle linear infinite;
    }

    @keyframes float-particle {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.4; }
      90% { opacity: 0.2; }
      100% { transform: translateY(-20px) rotate(360deg); opacity: 0; }
    }

    /* ── 布局 ── */
    .app-container {
      position: relative;
      z-index: 1;
      display: flex;
      height: 100vh;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── 侧边栏 ── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: rgba(26, 21, 32, 0.95);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar.collapsed {
      width: 0;
      overflow: hidden;
      border-right: none;
    }

    .sidebar-toggle {
      position: absolute;
      left: 220px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 48px;
      background: var(--card);
      border: 1px solid var(--border);
      border-left: none;
      border-radius: 0 6px 6px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: left 0.3s ease;
      color: var(--muted);
      font-size: 10px;
    }

    .sidebar-toggle:hover { color: var(--lavender); background: rgba(184,169,201,0.1); }

    .sidebar.collapsed ~ .sidebar-toggle { left: 0; }

    .sidebar-title {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .new-chat-btn {
      width: 100%;
      padding: 8px 12px;
      background: rgba(184, 169, 201, 0.1);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--lavender);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Noto Sans SC', sans-serif;
    }

    .new-chat-btn:hover {
      background: rgba(184, 169, 201, 0.2);
      border-color: var(--lavender);
    }

    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 8px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .session-list::-webkit-scrollbar { width: 3px; }
    .session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .session-item {
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 2px;
      border: 1px solid transparent;
    }

    .session-item:hover {
      background: rgba(184, 169, 201, 0.08);
      border-color: var(--border);
    }

    .session-item.active {
      background: rgba(184, 169, 201, 0.15);
      border-color: rgba(184, 169, 201, 0.3);
    }

    .session-item-title {
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
      flex: 1;
    }

    .session-item-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .rename-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 2px;
      border-radius: 3px;
      opacity: 0;
      transition: opacity 0.2s;
      line-height: 1;
      font-size: 11px;
    }

    .session-item:hover .rename-btn { opacity: 1; }
    .rename-btn:hover { color: var(--lavender); }

    /* 流式输出光标 */
    .typing-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--lavender);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .delete-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 2px;
      border-radius: 3px;
      opacity: 0;
      transition: opacity 0.2s;
      line-height: 1;
      font-size: 11px;
    }

    .session-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: #e07070; }

    .rename-input {
      width: 100%;
      background: rgba(184,169,201,0.1);
      border: 1px solid var(--lavender);
      border-radius: 4px;
      color: var(--text);
      font-size: 12px;
      padding: 2px 6px;
      outline: none;
      font-family: 'Noto Sans SC', sans-serif;
    }

    .session-item-time {
      font-size: 10px;
      color: var(--muted);
    }

    .session-empty {
      padding: 20px 10px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.8;
    }

    .sidebar-loading {
      padding: 16px 10px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    /* ── 主内容区 ── */
    .layout {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 0 16px;
    }

    /* ── Header ── */
    header {
      padding: 24px 0 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .avatar-wrap {
      position: relative;
      width: 56px;
      height: 56px;
      flex-shrink: 0;
    }

    .avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1.5px solid var(--lavender);
      animation: spin-ring 8s linear infinite;
      opacity: 0.6;
    }

    .avatar-ring::before {
      content: '✦';
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--lavender);
      font-size: 8px;
    }

    @keyframes spin-ring {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3d2f52 0%, #5c4478 50%, #7a5a9e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(140, 100, 180, 0.4);
    }

    .header-info { flex: 1; }

    .header-title {
      font-family: 'Cinzel', serif;
      font-size: 1.15rem;
      letter-spacing: 0.12em;
      color: var(--ash);
    }

    .header-subtitle {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.18em;
      margin-top: 2px;
      font-family: 'Noto Serif SC', serif;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #7ecba1;
      box-shadow: 0 0 8px #7ecba1;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    /* ── 对话区域 ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* 欢迎语 */
    .welcome {
      text-align: center;
      padding: 32px 20px;
      animation: fade-up 0.8s ease forwards;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .welcome-rune {
      font-size: 2.5rem;
      margin-bottom: 16px;
      display: block;
      filter: drop-shadow(0 0 12px var(--lavender));
    }

    .welcome h2 {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--ash);
      margin-bottom: 10px;
      letter-spacing: 0.08em;
    }

    .welcome p {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.9;
      max-width: 400px;
      margin: 0 auto;
    }

    .welcome-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px auto;
      max-width: 300px;
    }

    .welcome-divider::before,
    .welcome-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .welcome-divider span {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      font-family: 'Cinzel', serif;
    }

    /* 建议问题 */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 4px;
    }

    .suggestion-btn {
      background: rgba(184, 169, 201, 0.07);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.25s;
      font-family: 'Noto Sans SC', sans-serif;
    }

    .suggestion-btn:hover {
      background: rgba(184, 169, 201, 0.14);
      color: var(--ash);
      border-color: rgba(184, 169, 201, 0.3);
      transform: translateY(-1px);
    }

    /* 消息气泡 */
    .msg {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      animation: msg-appear 0.35s ease forwards;
    }

    @keyframes msg-appear {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    .msg.ai .msg-avatar {
      background: linear-gradient(135deg, #3d2f52, #6a4a88);
      box-shadow: 0 0 12px rgba(140, 100, 180, 0.3);
    }

    .msg.user .msg-avatar {
      background: rgba(200, 185, 200, 0.1);
      border: 1px solid var(--border);
    }

    .msg-bubble {
      max-width: 72%;
      padding: 13px 16px;
      border-radius: 14px;
      font-size: 0.88rem;
      line-height: 1.85;
      position: relative;
    }

    .msg.ai .msg-bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      backdrop-filter: blur(8px);
    }

    .msg.user .msg-bubble {
      background: var(--user-bg);
      border: 1px solid rgba(184, 169, 201, 0.2);
      border-top-right-radius: 4px;
      text-align: right;
    }

    .msg-name {
      font-size: 0.68rem;
      color: var(--lavender);
      letter-spacing: 0.12em;
      margin-bottom: 5px;
      font-family: 'Cinzel', serif;
    }

    .msg.user .msg-name { text-align: right; color: var(--muted); }

    /* 打字指示 */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 13px 16px;
    }

    .typing-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--lavender);
      animation: typing-bounce 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── 输入区域 ── */
    .input-section {
      padding: 12px 0 20px;
      flex-shrink: 0;
    }

    .input-wrap {
      background: rgba(30, 25, 40, 0.7);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 10px 12px;
      backdrop-filter: blur(10px);
      transition: border-color 0.3s;
    }

    .input-wrap:focus-within {
      border-color: rgba(184, 169, 201, 0.4);
      box-shadow: 0 0 20px rgba(184, 169, 201, 0.08);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.88rem;
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 300;
      resize: none;
      max-height: 120px;
      line-height: 1.6;
      padding: 2px 0;
    }

    textarea::placeholder { color: var(--muted); opacity: 0.6; }

    .send-btn {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #5c3d7a, #8056a8);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.25s;
      box-shadow: 0 2px 12px rgba(120, 80, 160, 0.3);
    }

    .send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 18px rgba(120, 80, 160, 0.45);
    }

    .send-btn:active { transform: scale(0.96); }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .send-icon {
      width: 16px; height: 16px;
      fill: none;
      stroke: white;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* 底部提示 */
    .footer-hint {
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
      opacity: 0.5;
      margin-top: 8px;
      letter-spacing: 0.1em;
    }

    /* 错误提示 */
    .error-toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(180, 60, 60, 0.85);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.8rem;
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }

    .error-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* 清空按钮 */
    .clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.7rem;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Noto Sans SC', sans-serif;
      letter-spacing: 0.05em;
    }

    .clear-btn:hover { color: var(--ash); border-color: rgba(184, 169, 201, 0.3); }
  </style>
</head>
<body>

<!-- 粒子背景 -->
<div class="particles" id="particles"></div>

<!-- 错误提示 -->
<div class="error-toast" id="errorToast"></div>

<div class="app-container">

<!-- 侧边栏容器 -->
<div style="position:relative;flex-shrink:0;">
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">✦ 旅途记录</div>
    <button class="new-chat-btn" onclick="newChat()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      新的相遇
    </button>
  </div>
  <div class="session-list" id="sessionList">
    <div class="sidebar-loading">加载中...</div>
  </div>
</div><!-- /sidebar -->
<button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="收起/展开">◀</button>
</div><!-- /sidebar-wrap -->

<!-- 主对话区 -->
<div class="layout">
  <!-- Header -->
  <header>
    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <div class="avatar">🪄</div>
    </div>
    <div class="header-info">
      <div class="header-title">Elaina · 伊蕾娜</div>
      <div class="header-subtitle">灰烬之魔女 · 旅途中</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="status-dot"></div>
    </div>
  </header>

  <!-- 对话区域 -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <span class="welcome-rune">✧</span>
      <h2>旅途中的片刻相遇</h2>
      <p>啊，是旅人呢。既然有缘相遇，不如来聊聊？<br/>本魔女正好在此小憩……</p>
      <div class="welcome-divider"><span>WANDERING WITCH</span></div>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion('你好，你是谁？')">你好，你是谁？</button>
        <button class="suggestion-btn" onclick="sendSuggestion('你的旅途中发生过什么有趣的事吗？')">旅途中的趣事</button>
        <button class="suggestion-btn" onclick="sendSuggestion('你是怎么成为魔女的？')">成为魔女的故事</button>
        <button class="suggestion-btn" onclick="sendSuggestion('你会害怕危险吗？')">会害怕危险吗？</button>
      </div>
    </div>
  </div>

  <!-- 输入区域 -->
  <div class="input-section">
    <div class="input-wrap">
      <textarea
        id="userInput"
        rows="1"
        placeholder="与伊蕾娜交谈……"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg class="send-icon" viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="footer-hint">✦ LangChain · Kimi · Redis 短期记忆 · ChromaDB 长期记忆 ✦</div>
  </div>
</div>

<script>
  // ── 粒子生成 ──
  const pContainer = document.getElementById('particles');
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 3 + 1;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random() * 100}%;
      animation-duration:${Math.random() * 15 + 10}s;
      animation-delay:${Math.random() * 10}s;
    `;
    pContainer.appendChild(p);
  }

  // ── 状态 ──
  let sessionId = localStorage.getItem('irena_session_id') || '';
  let isLoading = false;

  // ── 侧边栏收起/展开 ──
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const btn = document.getElementById('sidebarToggle');
    const collapsed = sidebar.classList.toggle('collapsed');
    btn.textContent = collapsed ? '▶' : '◀';
    btn.style.left = collapsed ? '0' : '220px';
  }

  // ── 重命名 session ──
  function startRename(e, sessionId) {
    e.stopPropagation();
    const item = e.target.closest('.session-item');
    const titleEl = item.querySelector('.session-item-title');
    const currentName = item.dataset.name || '';

    const input = document.createElement('input');
    input.className = 'rename-input';
    input.value = currentName;
    input.maxLength = 30;
    titleEl.replaceWith(input);
    input.focus();
    input.select();

    async function saveRename() {
      const newName = input.value.trim();
      if (newName && newName !== currentName) {
        try {
          await fetch('/api/session/rename', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_id: sessionId, name: newName })
          });
          item.dataset.name = newName;
        } catch(err) { /* 静默失败 */ }
      }
      loadSessionList(); // 刷新列表
    }

    input.addEventListener('blur', saveRename);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { loadSessionList(); }
    });
  }

  // ── 侧边栏：加载历史 session 列表 ──
  async function loadSessionList() {
    const list = document.getElementById('sessionList');
    try {
      const res = await fetch('/api/sessions');
      const sessions = await res.json();

      if (!sessions || sessions.length === 0) {
        list.innerHTML = '<div class="session-empty">暂无旅途记录<br/>开始第一次相遇吧</div>';
        return;
      }

      list.innerHTML = '';
      sessions.forEach(s => {
        const div = document.createElement('div');
        div.className = 'session-item' + (s.session_id === sessionId ? ' active' : '');
        div.dataset.sid = s.session_id;
        div.dataset.name = s.name || s.session_id.substring(0, 8);

        const t = s.last_active ? new Date(s.last_active) : null;
        const timeStr = t ? formatTime(t) : '';
        const name = s.name || ('旅途 ' + s.session_id.substring(0, 8));

        div.innerHTML = `
          <div class="session-item-row">
            <div class="session-item-title" title="${name}">✧ ${name}</div>
            <button class="rename-btn" title="重命名" onclick="startRename(event, '${s.session_id}')">✎</button>
            <button class="delete-btn" title="删除对话" onclick="deleteSession(event, '${s.session_id}')">✕</button>
          </div>
          <div class="session-item-time">${timeStr}</div>`;

        div.addEventListener('click', (e) => {
          if (e.target.classList.contains('rename-btn') || e.target.classList.contains('rename-input')) return;
          switchSession(s.session_id);
        });
        list.appendChild(div);
      });
    } catch(e) {
      list.innerHTML = '<div class="session-empty">加载失败<br/>请检查后端服务</div>';
    }
  }

  function formatTime(date) {
    const now = new Date();
    const diff = now - date;
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
    if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
    return date.toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' });
  }

  // ── 切换 session ──
  async function switchSession(sid) {
    if (sid === sessionId || isLoading) return;

    // 调用后端恢复接口，把历史写回 Redis
    try {
      const res = await fetch('/api/session/restore', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sid })
      });
      const data = await res.json();
      if (!res.ok) { showError('切换失败：' + (data.detail || '')); return; }

      // 切换前端状态
      sessionId = sid;
      localStorage.setItem('irena_session_id', sessionId);

      // 更新侧边栏高亮
      document.querySelectorAll('.session-item').forEach(el => {
        el.classList.toggle('active', el.dataset.sid === sid);
      });

      // 清空消息区，拉取该 session 历史消息展示
      await loadSessionMessages(sid, data.restored || 0);

    } catch(e) {
      showError('✦ 切换对话失败');
    }
  }

  // ── 加载某个 session 的历史消息展示 ──
  async function loadSessionMessages(sid, count) {
    const container = document.getElementById('messages');
    container.innerHTML = '';

    if (count === 0) {
      container.innerHTML = `
        <div class="welcome" id="welcome">
          <span class="welcome-rune">✧</span>
          <h2>旅途中的片刻相遇</h2>
          <p>啊，是旅人呢。既然有缘相遇，不如来聊聊？<br/>本魔女正好在此小憩……</p>
          <div class="welcome-divider"><span>WANDERING WITCH</span></div>
        </div>`;
      return;
    }

    // 从 MySQL 拉取历史消息展示
    try {
      const res = await fetch(`/api/session/messages?session_id=${sid}`);
      const messages = await res.json();
      // 按时间顺序展示（MySQL get_history 已按 created_at 正序返回）
      messages.forEach(m => appendMsg(m.role === 'user' ? 'user' : 'ai', m.content));
    } catch(e) {
      container.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px;">消息加载失败</div>';
    }
  }

  // ── 新建对话 ──
  function newChat() {
    sessionId = '';
    localStorage.removeItem('irena_session_id');
    loadSessionList();
    const container = document.getElementById('messages');
    container.innerHTML = `
      <div class="welcome" id="welcome">
        <span class="welcome-rune">✧</span>
        <h2>旅途中的片刻相遇</h2>
        <p>啊，是旅人呢。既然有缘相遇，不如来聊聊？<br/>本魔女正好在此小憩……</p>
        <div class="welcome-divider"><span>WANDERING WITCH</span></div>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="sendSuggestion('你好，你是谁？')">你好，你是谁？</button>
          <button class="suggestion-btn" onclick="sendSuggestion('你的旅途中发生过什么有趣的事吗？')">旅途中的趣事</button>
          <button class="suggestion-btn" onclick="sendSuggestion('你是怎么成为魔女的？')">成为魔女的故事</button>
          <button class="suggestion-btn" onclick="sendSuggestion('你会害怕危险吗？')">会害怕危险吗？</button>
        </div>
      </div>`;
    // 取消侧边栏高亮
    document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
  }

  // ── 页面加载时初始化 ──
  loadSessionList();

  // ── 自动调整文本框高度 ──
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // ── 回车发送 ──
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ── 建议问题 ──
  function sendSuggestion(text) {
    document.getElementById('userInput').value = text;
    sendMessage();
  }

  // ── 清空对话 ──
  // ── 删除历史对话 ──
  async function deleteSession(e, sid) {
    e.stopPropagation();
    if (!confirm('确定删除这段旅途记录吗？\n所有对话数据将一并清除，无法恢复。')) return;

    try {
      await fetch('/api/clear', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sid })
      });

      // 如果删除的是当前 session，重置到欢迎页
      if (sid === sessionId) {
        sessionId = '';
        localStorage.removeItem('irena_session_id');
        const container = document.getElementById('messages');
        container.innerHTML = `
          <div class="welcome" id="welcome">
            <span class="welcome-rune">✧</span>
            <h2>旅途中的片刻相遇</h2>
            <p>啊，是旅人呢。既然有缘相遇，不如来聊聊？<br/>本魔女正好在此小憩……</p>
            <div class="welcome-divider"><span>WANDERING WITCH</span></div>
            <div class="suggestions">
              <button class="suggestion-btn" onclick="sendSuggestion('你好，你是谁？')">你好，你是谁？</button>
              <button class="suggestion-btn" onclick="sendSuggestion('你的旅途中发生过什么有趣的事吗？')">旅途中的趣事</button>
              <button class="suggestion-btn" onclick="sendSuggestion('你是怎么成为魔女的？')">成为魔女的故事</button>
              <button class="suggestion-btn" onclick="sendSuggestion('你会害怕危险吗？')">会害怕危险吗？</button>
            </div>
          </div>`;
      }

      loadSessionList();
    } catch(err) {
      showError('✦ 删除失败，请重试');
    }
  }

  // ── 添加消息气泡 ──
  function appendMsg(role, text) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const container = document.getElementById('messages');
    const isAI = role === 'ai';

    const msg = document.createElement('div');
    msg.className = `msg ${isAI ? 'ai' : 'user'}`;
    msg.innerHTML = `
      <div class="msg-avatar">${isAI ? '🪄' : '🧳'}</div>
      <div class="msg-bubble">
        <div class="msg-name">${isAI ? 'Elaina' : '旅人'}</div>
        <div class="msg-text">${text.replace(/\n/g, '<br/>')}</div>
      </div>`;

    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
    return msg;
  }

  // ── 打字指示器 ──
  function showTyping() {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const container = document.getElementById('messages');
    const el = document.createElement('div');
    el.className = 'msg ai';
    el.id = 'typingIndicator';
    el.innerHTML = `
      <div class="msg-avatar">🪄</div>
      <div class="msg-bubble ai-bubble">
        <div class="msg-name">Elaina</div>
        <div class="typing-bubble">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>`;
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  // ── 错误提示 ──
  function showError(msg) {
    const toast = document.getElementById('errorToast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
  }

  // ── 发送消息 ──
  async function sendMessage() {
    if (isLoading) return;

    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    appendMsg('user', text);

    // 创建 AI 气泡（空的，流式填充）
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();
    const container = document.getElementById('messages');
    const aiMsg = document.createElement('div');
    aiMsg.className = 'msg ai';
    aiMsg.innerHTML = `
      <div class="msg-avatar">🪄</div>
      <div class="msg-bubble">
        <div class="msg-name">Elaina</div>
        <div class="msg-text" id="streamText"><span class="typing-cursor"></span></div>
      </div>`;
    container.appendChild(aiMsg);
    container.scrollTop = container.scrollHeight;

    const textEl = document.getElementById('streamText');
    let buffer = '';  // 已接收的完整文本

    try {
      const res = await fetch('/api/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId })
      });

      if (!res.ok) {
        textEl.innerHTML = '✦ 请求失败，请重试';
        showError('✦ 请求失败');
      } else {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        let sseBuffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          // 追加到 SSE 缓冲区，处理跨 chunk 粘包
          sseBuffer += decoder.decode(value, { stream: true });

          // 按双换行分割完整的 SSE 消息
          const parts = sseBuffer.split('\n\n');
          sseBuffer = parts.pop() || '';  // 最后一段可能不完整，留待下次

          for (const part of parts) {
            const dataLine = part.split('\n').find(l => l.startsWith('data: '));
            if (!dataLine) continue;
            const payload = dataLine.slice(6);

            if (payload === '[DONE]') {
              textEl.innerHTML = buffer.replace(/\n/g, '<br/>');
            } else if (payload.startsWith('[SESSION]')) {
              sessionId = payload.slice(9);
              localStorage.setItem('irena_session_id', sessionId);
              loadSessionList();
            } else if (payload.startsWith('[ERROR]')) {
              textEl.innerHTML = '✦ 生成出错，请重试';
              try { showError('✦ ' + JSON.parse(payload.slice(7))); } catch { showError('✦ 生成出错'); }
            } else {
              try { buffer += JSON.parse(payload); } catch { buffer += payload; }
              textEl.innerHTML = buffer.replace(/\n/g, '<br/>') + '<span class="typing-cursor"></span>';
              container.scrollTop = container.scrollHeight;
            }
          }
        }
      }
    } catch (err) {
      textEl.innerHTML = '✦ 网络错误，请检查后端服务';
      showError('✦ 网络错误，请检查后端服务是否运行');
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
</script>
</div><!-- /app-container -->
